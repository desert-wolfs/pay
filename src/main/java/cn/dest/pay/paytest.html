<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>订单支付示例</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 可选: 添加样式使页面简洁 -->
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .order-info, .payment-method { margin-bottom: 20px; }
        .payment-method label { margin-right: 10px; }
        #checkout-btn { padding: 10px 20px; font-size: 16px; }
    </style>
</head>
<body>
<!-- 订单信息 -->
<div class="order-info">
    <h2>订单信息dafs</h2>
    <p>订单号sdaf: <span id="order-number">123456789</span></p>
    <p>商品: 测试商品dsf</p>
    <p>价格: ¥100.00</p>
</div>

<!-- 支付方式选择 -->
<div class="payment-method">
    <h2>选择支付方式dsafsd</h2>
    <label><input type="radio" name="payway" value="wechat" checked> 微信支付</label>
    <label><input type="radio" name="payway" value="alipay"> 支付宝支付</label>
</div>

<!-- 结算按钮 -->
<button id="checkout-btn">结算</button>

<script>
    // 以下示例使用原生 JavaScript 编写
    // 监听“结算”按钮点击事件
    document.getElementById('checkout-btn').addEventListener('click', async function () {
        // 获取订单号和选中的支付方式
        const orderNo = document.getElementById('order-number').innerText;
        const paymentMethod = document.querySelector('input[name="payway"]:checked').value;

        try {
            // 向后端接口发送订单号和支付方式（接口地址为示例占位符）
            const response = await fetch('/api/pay', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ orderNo, paymentMethod })
            });
            const data = await response.json();  // 假设后端返回 JSON 格式的数据

            // 根据支付方式处理后端返回结果
            if (data.paymentMethod === 'wechat') {
                alert("tiao wechat pay")

                // const wechatParams = data.wechatParams;

                //     WeixinJSBridge.invoke(
                //         'getBrandWCPayRequest',

                //             appId: wechatParams.appId,
                //             timeStamp: wechatParams.timeStamp,
                //             nonceStr: wechatParams.nonceStr,
                //             package: wechatParams.package,
                //             signType: wechatParams.signType,
                //             paySign: wechatParams.paySign
                //         },
                //         function (res) {
                //             // 接口调用结果处理
                //             if (res.err_msg === 'get_brand_wcpay_request:ok') {
                //                 alert('微信支付成功');
                //             } else {
                //                 alert('微信支付失败: ' + res.err_msg);
                //             }
                //         }
                //     );
                // }
                // // 判断 WeixinJSBridge 是否已注入
                // if (typeof WeixinJSBridge === 'undefined') {
                //     if (document.addEventListener) {
                //         document.addEventListener('WeixinJSBridgeReady', onBridgeReady, false);
                //     } else if (document.attachEvent) {
                //         document.attachEvent('WeixinJSBridgeReady', onBridgeReady);
                //         document.attachEvent('onWeixinJSBridgeReady', onBridgeReady);
                //     }
                // } else {
                //     onBridgeReady();
                // }
            } else if (data.paymentMethod === 'alipay') {
                // 支付宝支付: 跳转到支付宝支付 URL
                alert("tiao alipay")
                // const alipayUrl = data.alipayUrl;
                // window.location.href = alipayUrl;  // 跳转到支付宝页面
            } else {
                alert('未知的支付方式');
            }
        } catch (error) {
            console.error('支付请求出错:', error);
            alert('支付请求出错，请稍后重试');
        }
    });
</script>
</body>
</html>
